[pytest]
# Pytest configuration for InfraGuard

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --hypothesis-show-statistics

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    property: Property-based tests using Hypothesis
    slow: Tests that take a long time to run

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
