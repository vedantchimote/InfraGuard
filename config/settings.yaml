# InfraGuard AIOps Configuration

# Prometheus connection settings
prometheus:
  url: "http://prometheus:9090"  # Can be overridden with PROMETHEUS_URL env var
  timeout: 30
  queries:
    - name: "cpu_usage"
      query: "cpu_usage_percent"
      metric_type: "cpu"
    - name: "memory_usage"
      query: "memory_usage_percent"
      metric_type: "memory"
    - name: "http_error_rate"
      query: "http_error_rate_percent"
      metric_type: "error_rate"
    - name: "request_latency"
      query: "request_latency_ms"
      metric_type: "latency"

# Collection settings
collection:
  interval: 60  # Collection interval in seconds
  batch_size: 100  # Number of data points to collect per query

# Machine Learning settings
ml:
  # Isolation Forest configuration
  isolation_forest:
    n_estimators: 100
    max_samples: 256
    contamination: 0.1  # Expected proportion of anomalies
    random_state: 42
    max_features: 1.0
  
  # Model persistence
  model_path: "models/pretrained/isolation_forest.pkl"
  
  # Feature engineering
  rolling_windows: [5, 10, 30]  # Window sizes for rolling statistics
  
  # Anomaly detection thresholds
  thresholds:
    cpu:
      confidence: 80  # Minimum confidence percentage to trigger alert
      severity_high: 95
      severity_medium: 85
    memory:
      confidence: 80
      severity_high: 95
      severity_medium: 85
    error_rate:
      confidence: 75
      severity_high: 90
      severity_medium: 80
    latency:
      confidence: 80
      severity_high: 95
      severity_medium: 85

# Time-series forecasting (optional)
forecasting:
  enabled: false  # Set to true to enable Prophet forecasting
  prophet:
    seasonality_mode: "multiplicative"
    changepoint_prior_scale: 0.05
    interval_width: 0.95
  prediction_window: 3600  # Forecast window in seconds (1 hour)
  forecast_interval: 300  # How often to generate forecasts (5 minutes)

# Alerting configuration
alerting:
  # Slack integration
  slack:
    enabled: false  # Set to true to enable Slack notifications
    webhook_url: ""  # Set your Slack webhook URL
    channel: "#infraguard-alerts"
    retry_attempts: 3
    retry_delay: 10
  
  # Jira integration
  jira:
    enabled: false  # Set to true to enable Jira ticket creation
    url: ""  # Jira instance URL (e.g., https://your-domain.atlassian.net)
    project_key: ""  # Jira project key
    username: ""  # Jira username/email
    api_token: ""  # Jira API token
  
  # Runbook mappings
  runbooks:
    cpu:
      high: "https://runbooks.example.com/cpu-spike"
      medium: "https://runbooks.example.com/cpu-elevated"
    memory:
      high: "https://runbooks.example.com/memory-leak"
      medium: "https://runbooks.example.com/memory-elevated"
    error_rate:
      high: "https://runbooks.example.com/error-spike"
      medium: "https://runbooks.example.com/error-elevated"
    latency:
      high: "https://runbooks.example.com/latency-spike"
      medium: "https://runbooks.example.com/latency-elevated"
    default: "https://runbooks.example.com/general-troubleshooting"

# Logging configuration
logging:
  level: "INFO"  # Can be overridden with LOG_LEVEL env var
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/infraguard.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# Health check configuration
health:
  enabled: true
  port: 8000
  endpoint: "/health"
