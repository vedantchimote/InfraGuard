apiVersion: v1
kind: Secret
metadata:
  name: infraguard-secrets
  labels:
    app: infraguard
type: Opaque
stringData:
  # Slack webhook URL (base64 encoded in production)
  SLACK_WEBHOOK_URL: ""
  
  # Jira credentials (base64 encoded in production)
  JIRA_URL: ""
  JIRA_PROJECT_KEY: ""
  JIRA_USERNAME: ""
  JIRA_API_TOKEN: ""

---
# Example of how to create secret from command line:
# kubectl create secret generic infraguard-secrets \
#   --from-literal=SLACK_WEBHOOK_URL='https://hooks.slack.com/services/...' \
#   --from-literal=JIRA_URL='https://your-domain.atlassian.net' \
#   --from-literal=JIRA_PROJECT_KEY='INFRA' \
#   --from-literal=JIRA_USERNAME='user@example.com' \
#   --from-literal=JIRA_API_TOKEN='your-api-token'
