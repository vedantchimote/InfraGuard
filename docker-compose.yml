version: '3.8'

services:
  # Prometheus monitoring system
  prometheus:
    image: prom/prometheus:latest
    container_name: infraguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - infraguard-network
    restart: unless-stopped

  # Dummy application that generates metrics
  dummy-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dummy-app
    container_name: infraguard-dummy-app
    ports:
      - "8080:8080"
    environment:
      - METRICS_PORT=8080
      - ANOMALY_PROBABILITY=0.05
    networks:
      - infraguard-network
    restart: unless-stopped

  # InfraGuard AIOps application
  infraguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infraguard-aiops
    ports:
      - "8000:8000"
    volumes:
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOG_LEVEL=INFO
    depends_on:
      - prometheus
      - dummy-app
    networks:
      - infraguard-network
    restart: unless-stopped

networks:
  infraguard-network:
    driver: bridge

volumes:
  prometheus-data:
